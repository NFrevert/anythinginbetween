<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything in Between</title>
    <link rel="stylesheet" href="styles.scss">
</head>
<body>

  <div class="navbar">
    <div class="logo">Anything in Between</div>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./News.html">News</a>
      <a href="./AboutUs.html">Über uns</a>
      <a href="./Contact.html">Kontakt</a>
    </div>

    <div class="burger" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <div class="mobile-menu" id="mobileMenu">
      <a href="./index.html">Home</a>
      <a href="./News.html">News</a>
      <a href="./AboutUs.html">Über uns</a>
      <a href="./Contact.html">Kontakt</a>
  </div>

  <div class="fancy-background">
    <div class="nebula"></div>
    <div class="stars" id="stars"></div>
  </div>

  <!-- CONTENT -->
  <div class="content-wrapper">
    <div class="content-box" style=" height: 500px; background: url(./Anything-in-Between.png); background-size: cover;background-repeat: no-repeat; background-position: center;">
      <img source="" />
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('active');
    }

    const starContainer = document.getElementById('stars');
    const numberOfStars = 400;

    for (let i = 0; i < numberOfStars; i++) {
      const star = document.createElement('div');
      star.classList.add('star');

      const size = Math.random() * 2;
      star.style.width = size + 'px';
      star.style.height = size + 'px';

      star.style.top = Math.random() * 100 + 'vh';
      star.style.left = Math.random() * 100 + 'vw';

      star.style.animationDuration = (Math.random() * 3 + 1) + 's';

      starContainer.appendChild(star);
    }
  </script>
</body>
</html>
